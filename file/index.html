<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ماگ - صفحه ساده</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            
            background: #ECE7D1;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Vazir', 'Segoe UI', Tahoma, sans-serif;
            overflow: hidden;
            position: fixed;
            width: 100%;
            height: 100%;
        }

        .container {
            text-align: center;
            padding: 20px;
        }

        /* طراحی ماگ */
        .mug {
            position: relative;
            width: 280px;
            height: 280px;
            margin: 0 auto 30px auto;
            filter: drop-shadow(0 20px 15px rgba(0,0,0,0.2));
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0px); }
            50% { transform: translateY(-10px); }
        }

        
        }

        .mug-body {
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ffffff 0%, #f5f5f5 100%);
            border-radius: 40% 40% 30% 30% / 30% 30% 20% 20%;
            border: 4px solid #fff5e6;
            box-shadow: 
                0 0 0 4px #ECE7D1,  /* رنگ حاشیه متناسب با پس زمینه جدید */
                0 15px 25px rgba(0,0,0,0.2),
                inset 0 -10px 20px rgba(0,0,0,0.1),
                inset 0 5px 15px rgba(255,255,255,0.8);
            position: relative;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ================================================ */
        /* تگ مخصوص عکس - مسیر عکس را خودتان تنظیم کنید */
        /* ================================================ */
        .mug-image {
            width: 250px;           /* عرض عکس - قابل تنظیم */
            height: 250px;          /* ارتفاع عکس - قابل تنظیم */
            object-fit: cover;       /* نحوه نمایش عکس (cover, contain, etc) */
            border-radius: 20px;     /* گرد کردن گوشه‌های عکس */
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            border: 3px solid white;
            z-index: 2;
            transition: transform 0.3s ease;
        }

        .mug-image:hover {
            transform: scale(1.05);  /* انیمیشن کوچک هنگام هاور */
        }
        /* ================================================ */

        .steam {
            position: absolute;
            width: 10px;
            height: 50px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            filter: blur(5px);
            animation: steam 2s ease-out infinite;
            z-index: 3;
        }

        .steam::before,
        .steam::after {
            content: '';
            position: absolute;
            width: 15px;
            height: 40px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            filter: blur(5px);
        }

        .steam::before {
            left: -20px;
            top: 10px;
            animation: steam 2.5s ease-out infinite 0.5s;
        }

        .steam::after {
            right: -20px;
            top: 5px;
            animation: steam 1.8s ease-out infinite 0.3s;
        }

        @keyframes steam {
            0% { opacity: 0; transform: translateY(0) scale(1); }
            50% { opacity: 0.5; transform: translateY(-20px) scale(1.2); }
            100% { opacity: 0; transform: translateY(-40px) scale(1.5); }
        }

        /* دکمه‌ها */
        .buttons {
            display: flex;
            gap: 25px;
            justify-content: center;
            margin-top: 20px;
        }

        .btn {
            padding: 16px 42px;
            border: none;
            border-radius: 50px;
            font-size: 1.4rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            letter-spacing: 1px;
            min-width: 170px;
        }

        .btn-price {
            background:#8A7650;
            color: #f5e6d3;
            border: 2px solid #f5e6d3;
        }

        .btn-price:hover {
            background: #6b431b;
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(139, 90, 43, 0.4);
        }

        .btn-telegram {
            background: #f5e6d3;
            color: #8b5a2b;
            border: 2px solid #8b5a2b;
        }

        .btn-telegram:hover {
            background: #f0d5b5;
            transform: scale(1.05);
            box-shadow: 0 15px 25px rgba(139, 90, 43, 0.3);
        }

        .btn:active {
            transform: scale(0.95);
        }

        /* جلوگیری از اسکرول */
        html, body {
            overflow: hidden;
            height: 100%;
            width: 100%;
            position: fixed;
        }

        @media (max-width: 480px) {
            .mug {
                width: 220px;
                height: 220px;
            }
            
            .mug-image {
                width: 120px;
                height: 120px;
            }
            
            .buttons {
                flex-direction: column;
                gap: 15px;
            }
            
            .btn {
                padding: 14px 30px;
                font-size: 1.2rem;
                min-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ماگ -->
        <div class="mug">
            
            <div class="mug-body">
                <!-- ================================================ -->
                
                <img src="aks.png" alt="تصویر لوگو" class="mug-image">
                <!-- ================================================ -->
                <div class="steam"></div>
            </div>
        </div>
        
        <!-- دکمه‌ها -->
        <div class="buttons">
            <button class="btn btn-price" onclick="window.open('list.pdf', '_blank')">لیست قیمت</button>
            <button class="btn btn-telegram" onclick="window.open('https://t.me/specialshopgnv', '_blank')">کانال تلگرام</button>
        </div>
    </div>
</body>
</html>
